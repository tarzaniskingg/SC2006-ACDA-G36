services:
  - type: web
    name: sgtravelbud-api
    runtime: python
    rootDir: Program
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_MAPS_KEY
        sync: false  # Set manually in Render dashboard
      - key: LTA_ACCOUNT_KEY
        sync: false  # Set manually in Render dashboard
    plan: free
