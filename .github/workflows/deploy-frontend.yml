name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Program/frontend/package-lock.json

      - name: Install dependencies
        working-directory: Program/frontend
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: Program/frontend
        env:
          GITHUB_PAGES: true
          # Point to your deployed backend on Render (update this URL after deploying)
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: npm run build

      # SPA fix: copy index.html to 404.html so client-side routing works
      - name: SPA routing fix
        run: cp Program/frontend/dist/index.html Program/frontend/dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: Program/frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
